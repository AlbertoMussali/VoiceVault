name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend dependencies
        run: uv pip install --system -r apps/api/requirements.txt

      - name: Lint backend (syntax/type import smoke)
        run: uv run --directory apps/api python -m compileall app tests

      - name: Run backend tests
        run: uv run python -m unittest discover -s apps/api/tests

  frontend:
    name: Frontend lint + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm install

      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint

      - name: Run frontend tests
        working-directory: apps/web
        run: npm run test
